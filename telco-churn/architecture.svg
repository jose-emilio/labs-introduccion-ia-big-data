<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="Segoe UI, Arial, sans-serif">

  <!-- ── Fondo ── -->
  <rect width="1100" height="920" fill="#F7F9FC" rx="12"/>

  <!-- ══════════════════════════════════════════════════════
       TÍTULO
  ══════════════════════════════════════════════════════ -->
  <text x="550" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1A2E">Arquitectura del Pipeline de Predicción de Churn</text>
  <text x="550" y="64" text-anchor="middle" font-size="13" fill="#555">Stacking de dos niveles · LightGBM · CatBoost · XGBoost · Regresión Logística</text>

  <!-- ══════════════════════════════════════════════════════
       BANDA: DATOS DE ENTRADA
  ══════════════════════════════════════════════════════ -->
  <rect x="30" y="85" width="1040" height="110" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="55" y="107" font-size="11" font-weight="bold" fill="#4338CA" letter-spacing="1">DATOS DE ENTRADA</text>

  <!-- Dataset original -->
  <rect x="55" y="115" width="180" height="64" rx="8" fill="#4F46E5" />
  <text x="145" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Dataset Original</text>
  <text x="145" y="156" text-anchor="middle" font-size="10.5" fill="#C7D2FE">IBM Telco Churn</text>
  <text x="145" y="170" text-anchor="middle" font-size="10" fill="#A5B4FC">7.043 clientes · 21 variables</text>

  <!-- Flecha dataset → split -->
  <line x1="235" y1="147" x2="285" y2="147" stroke="#6366F1" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Train / Test split -->
  <rect x="285" y="115" width="160" height="64" rx="8" fill="#6366F1"/>
  <text x="365" y="137" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Train / Test Split</text>
  <text x="365" y="153" text-anchor="middle" font-size="10.5" fill="#C7D2FE">Estratificado 80 / 20</text>
  <text x="365" y="168" text-anchor="middle" font-size="10" fill="#A5B4FC">random_state = 27</text>

  <!-- Flecha split → FE -->
  <line x1="445" y1="147" x2="495" y2="147" stroke="#6366F1" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Feature Engineering -->
  <rect x="495" y="115" width="175" height="64" rx="8" fill="#7C3AED"/>
  <text x="582" y="137" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Feature Engineering</text>
  <text x="582" y="153" text-anchor="middle" font-size="10.5" fill="#DDD6FE">11 nuevas variables</text>
  <text x="582" y="168" text-anchor="middle" font-size="10" fill="#C4B5FD">auto_pay · tenure_ratio · …</text>

  <!-- Flecha FE → TE -->
  <line x1="670" y1="147" x2="720" y2="147" stroke="#6366F1" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Target Encoding -->
  <rect x="720" y="115" width="175" height="64" rx="8" fill="#9333EA"/>
  <text x="807" y="137" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Target Encoding</text>
  <text x="807" y="153" text-anchor="middle" font-size="10.5" fill="#E9D5FF">16 variables categóricas</text>
  <text x="807" y="168" text-anchor="middle" font-size="10" fill="#D8B4FE">8 stats por variable · sin leakage</text>

  <!-- Flecha TE → features listas -->
  <line x1="895" y1="147" x2="945" y2="147" stroke="#6366F1" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Features listas -->
  <rect x="945" y="115" width="110" height="64" rx="8" fill="#A855F7"/>
  <text x="1000" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Features</text>
  <text x="1000" y="156" text-anchor="middle" font-size="10.5" fill="#E9D5FF">listas para</text>
  <text x="1000" y="171" text-anchor="middle" font-size="10" fill="#E9D5FF">modelado</text>

  <!-- ══════════════════════════════════════════════════════
       BANDA: NIVEL 1 — MODELOS BASE
  ══════════════════════════════════════════════════════ -->
  <rect x="30" y="220" width="1040" height="310" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="55" y="242" font-size="11" font-weight="bold" fill="#15803D" letter-spacing="1">NIVEL 1 — MODELOS BASE  (Validación cruzada estratificada · 3 folds)</text>

  <!-- ── Flechas desde Features a cada modelo ── -->
  <line x1="1000" y1="179" x2="1000" y2="210" stroke="#A855F7" stroke-width="1.5"/>
  <line x1="1000" y1="210" x2="220"  y2="210" stroke="#A855F7" stroke-width="1.5"/>
  <line x1="1000" y1="210" x2="550"  y2="210" stroke="#A855F7" stroke-width="1.5"/>
  <line x1="1000" y1="210" x2="880"  y2="210" stroke="#A855F7" stroke-width="1.5"/>
  <line x1="220"  y1="210" x2="220"  y2="255" stroke="#A855F7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="550"  y1="210" x2="550"  y2="255" stroke="#A855F7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="880"  y1="210" x2="880"  y2="255" stroke="#A855F7" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- ── LIGHTGBM ── -->
  <rect x="60" y="255" width="320" height="255" rx="10" fill="white" stroke="#86EFAC" stroke-width="2"/>
  <rect x="60" y="255" width="320" height="36" rx="10" fill="#16A34A"/>
  <rect x="60" y="279" width="320" height="12" rx="0" fill="#16A34A"/>
  <text x="220" y="279" text-anchor="middle" font-size="13" font-weight="bold" fill="white">LightGBM</text>

  <text x="80" y="315" font-size="10.5" fill="#166534" font-weight="bold">Optimización (Optuna · 5 trials)</text>
  <rect x="80" y="322" width="280" height="58" rx="6" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="92" y="338" font-size="10" fill="#374151">n_estimators:   140 – 800</text>
  <text x="92" y="352" font-size="10" fill="#374151">learning_rate:  0.01 – 0.1  (log)</text>
  <text x="92" y="366" font-size="10" fill="#374151">num_leaves:     200 – 4000</text>
  <text x="92" y="380" font-size="10" fill="#374151">reg_alpha / reg_lambda:  L1 + L2</text>

  <text x="80" y="402" font-size="10.5" fill="#166534" font-weight="bold">Configuración fija</text>
  <rect x="80" y="408" width="280" height="44" rx="6" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="92" y="424" font-size="10" fill="#374151">objective: binary  ·  metric: auc</text>
  <text x="92" y="438" font-size="10" fill="#374151">boosting: gbdt  ·  device: cpu</text>
  <text x="92" y="452" font-size="10" fill="#374151">n_jobs: -1  ·  verbosity: -1</text>

  <rect x="80" y="462" width="280" height="34" rx="6" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="220" y="479" text-anchor="middle" font-size="10.5" fill="#15803D" font-weight="bold">Salida: OOF preds (train) + Test preds</text>
  <text x="220" y="492" text-anchor="middle" font-size="10" fill="#166534">lgbm_pred  ·  AUC por fold</text>

  <!-- ── CATBOOST ── -->
  <rect x="390" y="255" width="320" height="255" rx="10" fill="white" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="390" y="255" width="320" height="36" rx="10" fill="#DC2626"/>
  <rect x="390" y="279" width="320" height="12" rx="0" fill="#DC2626"/>
  <text x="550" y="279" text-anchor="middle" font-size="13" font-weight="bold" fill="white">CatBoost</text>

  <text x="410" y="315" font-size="10.5" fill="#991B1B" font-weight="bold">Optimización (Optuna · 5 trials)</text>
  <rect x="410" y="322" width="280" height="58" rx="6" fill="#FFF5F5" stroke="#FCA5A5"/>
  <text x="422" y="338" font-size="10" fill="#374151">iterations:         150 – 800</text>
  <text x="422" y="352" font-size="10" fill="#374151">depth:              4 – 16</text>
  <text x="422" y="366" font-size="10" fill="#374151">l2_leaf_reg:        1e-3 – 10  (log)</text>
  <text x="422" y="380" font-size="10" fill="#374151">bagging_temperature: 0 – 5</text>

  <text x="410" y="402" font-size="10.5" fill="#991B1B" font-weight="bold">Configuración fija</text>
  <rect x="410" y="408" width="280" height="44" rx="6" fill="#FFF5F5" stroke="#FCA5A5"/>
  <text x="422" y="424" font-size="10" fill="#374151">loss_function: Logloss  ·  eval: AUC</text>
  <text x="422" y="438" font-size="10" fill="#374151">task_type: CPU  ·  verbose: 0</text>
  <text x="422" y="452" font-size="10" fill="#374151">Manejo nativo de categóricas</text>

  <rect x="410" y="462" width="280" height="34" rx="6" fill="#FEE2E2" stroke="#FCA5A5"/>
  <text x="550" y="479" text-anchor="middle" font-size="10.5" fill="#DC2626" font-weight="bold">Salida: OOF preds (train) + Test preds</text>
  <text x="550" y="492" text-anchor="middle" font-size="10" fill="#991B1B">cat_pred  ·  AUC por fold</text>

  <!-- ── XGBOOST ── -->
  <rect x="720" y="255" width="320" height="255" rx="10" fill="white" stroke="#FCD34D" stroke-width="2"/>
  <rect x="720" y="255" width="320" height="36" rx="10" fill="#D97706"/>
  <rect x="720" y="279" width="320" height="12" rx="0" fill="#D97706"/>
  <text x="880" y="279" text-anchor="middle" font-size="13" font-weight="bold" fill="white">XGBoost</text>

  <text x="740" y="315" font-size="10.5" fill="#92400E" font-weight="bold">Optimización (Optuna · 5 trials)</text>
  <rect x="740" y="322" width="280" height="58" rx="6" fill="#FFFBEB" stroke="#FCD34D"/>
  <text x="752" y="338" font-size="10" fill="#374151">n_estimators:   200 – 400</text>
  <text x="752" y="352" font-size="10" fill="#374151">max_depth:      3 – 16</text>
  <text x="752" y="366" font-size="10" fill="#374151">gamma:          1e-4 – 10  (log)</text>
  <text x="752" y="380" font-size="10" fill="#374151">min_child_weight: 1 – 20</text>

  <text x="740" y="402" font-size="10.5" fill="#92400E" font-weight="bold">Configuración fija</text>
  <rect x="740" y="408" width="280" height="44" rx="6" fill="#FFFBEB" stroke="#FCD34D"/>
  <text x="752" y="424" font-size="10" fill="#374151">objective: binary:logistic</text>
  <text x="752" y="438" font-size="10" fill="#374151">eval_metric: auc  ·  n_jobs: -1</text>
  <text x="752" y="452" font-size="10" fill="#374151">enable_categorical: False</text>

  <rect x="740" y="462" width="280" height="34" rx="6" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="880" y="479" text-anchor="middle" font-size="10.5" fill="#D97706" font-weight="bold">Salida: OOF preds (train) + Test preds</text>
  <text x="880" y="492" text-anchor="middle" font-size="10" fill="#92400E">xgb_pred  ·  AUC por fold</text>

  <!-- ══════════════════════════════════════════════════════
       BANDA: STACKING — CONSTRUCCIÓN DEL NIVEL 2
  ══════════════════════════════════════════════════════ -->
  <rect x="30" y="550" width="1040" height="130" rx="10" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="55" y="572" font-size="11" font-weight="bold" fill="#C2410C" letter-spacing="1">STACKING — CONSTRUCCIÓN DEL CONJUNTO DE NIVEL 2</text>

  <!-- Flechas desde salidas de modelos hacia stacking -->
  <line x1="220" y1="510" x2="220" y2="540" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="550" y1="510" x2="550" y2="540" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="880" y1="510" x2="880" y2="540" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="220" y1="540" x2="880" y2="540" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="550" y1="540" x2="550" y2="555" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Stack features box -->
  <rect x="80" y="582" width="430" height="82" rx="8" fill="white" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="295" y="601" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">Predicciones OOF concatenadas (stack_train)</text>
  <text x="130" y="620" font-size="10" fill="#374151">Columnas base:   lgbm_pred · cat_pred · xgb_pred</text>
  <text x="130" y="635" font-size="10" fill="#374151">Features derivadas:  mean_pred · max_pred · min_pred · std_pred</text>
  <text x="130" y="650" font-size="10" fill="#374151">Diferencias:  lgbm−cat · lgbm−xgb · cat−xgb</text>

  <!-- Etiqueta stack_test -->
  <rect x="530" y="582" width="510" height="82" rx="8" fill="white" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="785" y="601" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">Predicciones sobre Test (stack_test)</text>
  <text x="560" y="620" font-size="10" fill="#374151">Promedio de los 3 folds por modelo base</text>
  <text x="560" y="635" font-size="10" fill="#374151">Mismas features derivadas aplicadas</text>
  <text x="560" y="650" font-size="10" fill="#374151">Sin data leakage: estadísticas calculadas sobre original_data</text>

  <!-- ══════════════════════════════════════════════════════
       BANDA: NIVEL 2 — METAMODELO
  ══════════════════════════════════════════════════════ -->
  <rect x="30" y="700" width="1040" height="130" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="55" y="722" font-size="11" font-weight="bold" fill="#1D4ED8" letter-spacing="1">NIVEL 2 — METAMODELO</text>

  <!-- Flecha stacking → metamodelo -->
  <line x1="295" y1="664" x2="295" y2="695" stroke="#F97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <line x1="785" y1="664" x2="785" y2="695" stroke="#F97316" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Metamodelo box -->
  <rect x="80" y="730" width="430" height="82" rx="8" fill="#1D4ED8"/>
  <text x="295" y="754" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Regresión Logística (Metamodelo)</text>
  <text x="295" y="772" text-anchor="middle" font-size="10.5" fill="#BFDBFE">Entrenada sobre stack_train  ·  C = 1.0  ·  max_iter = 1000</text>
  <text x="295" y="788" text-anchor="middle" font-size="10.5" fill="#BFDBFE">Validación cruzada estratificada · 3 folds (OOF del metamodelo)</text>
  <text x="295" y="804" text-anchor="middle" font-size="10" fill="#93C5FD">Simple · interpretable · resistente al overfitting</text>

  <!-- Predicciones finales box -->
  <rect x="530" y="730" width="510" height="82" rx="8" fill="#2563EB"/>
  <text x="785" y="754" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Predicciones Finales</text>
  <text x="785" y="772" text-anchor="middle" font-size="10.5" fill="#BFDBFE">meta_res[&quot;test_preds&quot;]  →  submission.csv</text>
  <text x="785" y="788" text-anchor="middle" font-size="10.5" fill="#BFDBFE">Probabilidad de churn por cliente  [0, 1]</text>
  <text x="785" y="804" text-anchor="middle" font-size="10" fill="#93C5FD">Métrica de evaluación: AUC-ROC · Average Precision</text>

  <!-- ══════════════════════════════════════════════════════
       BANDA: EVALUACIÓN
  ══════════════════════════════════════════════════════ -->
  <rect x="30" y="850" width="1040" height="52" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="55" y="870" font-size="11" font-weight="bold" fill="#475569" letter-spacing="1">EVALUACIÓN (sobre predicciones OOF — sin data leakage)</text>
  <text x="200" y="890" font-size="10.5" fill="#64748B">AUC-ROC</text>
  <text x="370" y="890" font-size="10.5" fill="#64748B">Curva Precisión-Recall · Average Precision</text>
  <text x="650" y="890" font-size="10.5" fill="#64748B">Matriz de confusión (umbral 0.5)</text>
  <text x="880" y="890" font-size="10.5" fill="#64748B">Feature Importance</text>

  <!-- Flecha metamodelo → evaluación -->
  <line x1="295" y1="812" x2="295" y2="845" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue2)"/>
  <line x1="785" y1="812" x2="785" y2="845" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue2)"/>

  <!-- ══════════════════════════════════════════════════════
       MARCADORES DE FLECHAS
  ══════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366F1"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#A855F7"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6B7280"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F97316"/>
    </marker>
    <marker id="arr-blue2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
  </defs>

</svg>
